<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="إشعارات Afnan AI">
    <title id="pageTitle">الإشعارات - Afnan AI</title>
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: white; }
        .notification-card { background-color: #F8F9FA; border-radius: 1.2rem; transition: all 0.2s ease; }
        .notification-card:hover { background-color: #F1F2F4; }
        .notification-icon { width: 50px; height: 50px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='index.html'" class="p-2 hover:bg-gray-100 rounded-full transition-all">
                <i class="fa-solid fa-arrow-right text-xl"></i>
            </button>
            <h1 class="text-2xl font-bold text-gray-900">الإشعارات</h1>
            <div class="w-10"></div>
        </div>

        <!-- Notifications List -->
        <div id="notificationsList" class="space-y-3">
            <!-- Notifications will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12">
            <i class="fa-solid fa-bell text-5xl text-gray-300 mb-4 inline-block"></i>
            <h3 class="text-xl font-bold text-gray-600 mb-2">لا توجد إشعارات</h3>
            <p class="text-gray-500">ستظهر الإشعارات هنا عند حدوث أي تحديثات مهمة.</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function loadNotifications() {
            const notifications = AccountSystem.getNotifications();
            const list = document.getElementById('notificationsList');
            const emptyState = document.getElementById('emptyState');

            if (notifications.length === 0) {
                list.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            list.classList.remove('hidden');
            emptyState.classList.add('hidden');

            list.innerHTML = notifications.map(notif => {
                const date = new Date(notif.createdAt);
                const timeAgo = getTimeAgo(date);
                const iconClass = {
                    'info': 'fa-circle-info text-blue-500',
                    'success': 'fa-check-circle text-green-500',
                    'warning': 'fa-exclamation-circle text-yellow-500',
                    'error': 'fa-times-circle text-red-500'
                }[notif.type] || 'fa-circle-info text-blue-500';

                return `
                    <div class="notification-card p-4 flex items-start gap-4">
                        <div class="flex-shrink-0">
                            <i class="fa-solid ${iconClass} text-2xl"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-gray-900 mb-1">${notif.title}</h3>
                            <p class="text-sm text-gray-600 mb-2">${notif.message}</p>
                            <p class="text-xs text-gray-500">${timeAgo}</p>
                        </div>
                        ${notif.image ? `<img src="${notif.image}" alt="notification" class="notification-icon object-cover rounded-lg">` : ''}
                    </div>
                `;
            }).join('');
        }

        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            
            if (seconds < 60) return 'الآن';
            if (seconds < 3600) return `قبل ${Math.floor(seconds / 60)} دقيقة`;
            if (seconds < 86400) return `قبل ${Math.floor(seconds / 3600)} ساعة`;
            return `قبل ${Math.floor(seconds / 86400)} يوم`;
        }

        // تحميل الإشعارات عند فتح الصفحة
        loadNotifications();
    </script>
</body>
</html>
