<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Afnan AI - منصة ذكية للدردشة والتواصل مع نماذج AI متقدمة.">
    <meta name="author" content="Afnan AI">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <title>Afnan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app.css">
    <script src="https://unpkg.com/i18next@23.2.3/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@2.2.1/i18nextHttpBackend.min.js"></script>
    <script src="https://unpkg.com/i18next-browser-languagedetector@7.1.0/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="security.js"></script>
    <script src="app.js" defer></script>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.7); --glass-border: rgba(255, 255, 255, 0.3); }
        .glass { backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: var(--glass-bg); border: 1px solid var(--glass-border); }
        .sidebar-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Unified Input Styles */
        .mode-options-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }
        .mode-options-container.active {
            max-height: 500px;
            opacity: 1;
            padding-bottom: 1rem;
        }
        
        .option-btn {
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
            border: 1px solid #f3f4f6;
            background: #f9fafb;
        }
        .option-btn.active { background: black; color: white; border-color: black; }
        .section-label { font-size: 10px; font-weight: 800; color: #9ca3af; margin-bottom: 6px; display: block; text-transform: uppercase; }

        #langToggle { cursor: pointer; padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; background: #f3f4f6; transition: all 0.2s; }
        #langToggle:hover { background: #e5e7eb; }
        
        .chat-input-wrapper {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .chat-input-wrapper:focus-within { border-color: #d1d5db; box-shadow: 0 15px 30px -5px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="antialiased text-gray-900 bg-white">

    <div id="overlay" class="fixed inset-0 bg-black/10 backdrop-blur-[2px] hidden transition-opacity duration-300 opacity-0" style="z-index: 100;"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-[#fcfcfc] border-r border-gray-100 flex flex-col transform -translate-x-full md:translate-x-0 sidebar-transition h-full shadow-sm md:shadow-none z-[150]">
        <div class="p-4 flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <button id="langToggle" onclick="window.toggleLanguage()">EN</button>
                <img src="logo.jpg" alt="Logo" class="w-8 h-8 rounded-full">
            </div>

            <button id="newChatBtn" class="flex items-center gap-3 w-full bg-white border border-gray-100 p-3.5 rounded-2xl hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                <i class="fa-solid fa-plus text-xs"></i>
                <span data-i18n="common.new_chat" class="font-bold text-gray-700 text-sm">محادثة جديدة</span>
            </button>
            
            <div class="flex gap-2">
                <button onclick="window.switchMode('image')" class="flex-1 flex items-center justify-center gap-2 bg-white border border-gray-100 p-3 rounded-xl hover:bg-gray-50 transition-all shadow-sm text-xs font-bold">
                    <i class="fa-solid fa-image text-blue-500"></i>
                    <span data-i18n="common.image_gen">توليد الصور</span>
                </button>
                <button onclick="window.switchMode('video')" class="flex-1 flex items-center justify-center gap-2 bg-white border border-gray-100 p-3 rounded-xl hover:bg-gray-50 transition-all shadow-sm text-xs font-bold">
                    <i class="fa-solid fa-video text-purple-500"></i>
                    <span data-i18n="common.video_gen">توليد الفيديو</span>
                </button>
            </div>

            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                <input type="text" id="historySearch" data-i18n="[placeholder]common.search_placeholder" placeholder="بحث في المحادثات..." class="w-full bg-gray-100 border-none rounded-xl py-2 pr-9 pl-3 text-xs focus:ring-1 focus:ring-gray-200">
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto px-4 space-y-4 hide-scrollbar" id="historyList">
            <div id="recentSection" class="space-y-1">
                <p data-i18n="common.recent" class="text-[10px] font-bold text-gray-400 px-2 mb-2">الأخيرة</p>
                <div id="recentList" class="space-y-1"></div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-100 space-y-1 relative" id="profileSection"></div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 h-full relative">
        <header class="h-[64px] flex items-center justify-between px-6 border-b border-gray-50 bg-white/80 backdrop-blur-md shrink-0 relative z-50">
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="flex flex-col gap-1.5 p-1 md:hidden">
                    <span class="w-6 h-0.5 bg-gray-600 rounded-full"></span>
                    <span class="w-4 h-0.5 bg-gray-600 rounded-full"></span>
                </button>
            </div>

            <div id="modelSelectorTop" class="hidden">
                <button id="currentModelBtn" class="glass px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-white/90 transition-all">
                    <span id="activeModelName">mistral-small-3.2</span>
                    <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
                </button>
                <div id="modelDropdown" class="glass absolute top-full left-0 mt-2 w-56 rounded-2xl shadow-xl hidden animate-pop overflow-hidden z-[200]">
                    <div class="p-1.5 space-y-0.5" id="chatModelsList"></div>
                </div>
            </div>

            <div id="authButtons">
                <button id="loginBtnHeader" onclick="window.navigateToPage('login.html')" class="bg-black text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-gray-800 transition-all" data-i18n="common.login">تسجيل الدخول</button>
            </div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto hide-scrollbar scroll-smooth bg-white">
            <div id="emptyView" class="min-h-full flex flex-col items-center justify-center text-center p-12 opacity-30 select-none">
                <img src="logo.jpg" class="w-20 h-20 mb-4 grayscale" alt="Logo">
                <h2 class="text-2xl font-bold" data-i18n="chat.empty_title">Afnan ai</h2>
            </div>
            <div id="messageBox" class="max-w-4xl mx-auto p-4 md:p-8 flex flex-col gap-8"></div>
        </div>

        <!-- Unified Input Area -->
        <div class="w-full bg-white p-4 md:p-8 pt-2 shrink-0 safe-pb">
            <div class="max-w-3xl mx-auto">
                <div class="chat-input-wrapper p-2">
                    <!-- Dynamic Options Container -->
                    <div id="modeOptions" class="mode-options-container px-4">
                        <div class="flex flex-col gap-4 border-b border-gray-50 pb-4 mb-2">
                            <div class="flex justify-between items-center">
                                <h3 id="modeTitle" class="text-xs font-black uppercase tracking-wider text-gray-400">توليد الصور</h3>
                                <button onclick="window.switchMode('chat')" class="text-[10px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded-lg">إلغاء</button>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <span data-i18n="generator.model_label" class="section-label">نموذج التوليد</span>
                                    <select id="genModel" class="w-full bg-gray-50 border-none rounded-xl p-2.5 text-[11px] font-bold focus:ring-1 focus:ring-black"></select>
                                </div>
                                <div class="space-y-2">
                                    <span data-i18n="generator.size_label" class="section-label">الحجم</span>
                                    <div class="flex gap-1 bg-gray-50 p-1 rounded-xl">
                                        <button onclick="window.setGenSize('1:1')" class="size-opt flex-1 py-1.5 text-[10px] font-bold rounded-lg active" data-size="1:1">1:1</button>
                                        <button onclick="window.setGenSize('9:16')" class="size-opt flex-1 py-1.5 text-[10px] font-bold rounded-lg" data-size="9:16">9:16</button>
                                        <button onclick="window.setGenSize('16:9')" class="size-opt flex-1 py-1.5 text-[10px] font-bold rounded-lg" data-size="16:9">16:9</button>
                                    </div>
                                </div>
                            </div>

                            <div id="videoOptions" class="space-y-2 hidden">
                                <span data-i18n="generator.duration_label" class="section-label">مدة التوليد</span>
                                <div class="flex gap-2">
                                    <button onclick="window.setGenDuration(5)" class="dur-opt flex-1 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold active" data-dur="5">5 <span data-i18n="generator.seconds">ث</span></button>
                                    <button onclick="window.setGenDuration(10)" class="dur-opt flex-1 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold" data-dur="10">10 <span data-i18n="generator.seconds">ث</span></button>
                                    <button onclick="window.setGenDuration(15)" class="dur-opt flex-1 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold" data-dur="15">15 <span data-i18n="generator.seconds">ث</span></button>
                                    <button onclick="window.setGenDuration(20)" class="dur-opt flex-1 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold" data-dur="20">20 <span data-i18n="generator.seconds">ث</span></button>
                                </div>
                            </div>

                            <div id="imageOptions" class="space-y-2">
                                <span data-i18n="generator.count_label" class="section-label">عدد الصور</span>
                                <div class="flex gap-2">
                                    <button onclick="window.setGenCount(1)" class="count-opt flex-1 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold active" data-count="1">1x</button>
                                    <button onclick="window.setGenCount(2)" class="count-opt flex-1 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold" data-count="2">2x</button>
                                    <button onclick="window.setGenCount(3)" class="count-opt flex-1 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold" data-count="3">3x</button>
                                    <button onclick="window.setGenCount(4)" class="count-opt flex-1 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold" data-count="4">4x</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="attachmentPreview" class="px-4 pt-2 hidden flex-wrap gap-3 pb-3"></div>

                    <div class="flex items-end gap-2 p-1">
                        <button id="mainAttachBtn" type="button" class="w-11 h-11 flex items-center justify-center rounded-full text-gray-900 hover:bg-gray-50 transition-all shrink-0">
                            <i id="attachIcon" class="fa-solid fa-plus text-lg"></i>
                        </button>
                        <textarea id="chatInput" rows="1" data-i18n="[placeholder]chat.input_placeholder" placeholder="اسأل Afnan ai..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 px-1 text-[16px] resize-none max-h-40 hide-scrollbar" dir="auto"></textarea>
                        <button id="sendBtn" class="w-11 h-11 bg-black text-white rounded-full flex items-center justify-center shrink-0 transition-all active:scale-90">
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals (Only essential ones) -->
    <div id="imageViewer" class="fixed inset-0 bg-black/95 z-[5000] hidden flex-col" onclick="if(event.target === this) window.closeImageViewer()">
        <div class="flex justify-between items-center p-6 text-white">
            <button onclick="window.closeImageViewer()" class="text-2xl hover:bg-white/10 p-2 rounded-lg transition-all"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 flex items-center justify-center p-4">
            <img id="viewerImg" src="" class="max-w-full max-h-full object-contain rounded-2xl">
        </div>
    </div>

    <div id="logoutConfirm" class="hidden fixed inset-0 bg-black/40 z-[9999] items-center justify-center">
        <div class="glass p-8 rounded-3xl text-center max-w-xs w-full mx-4 shadow-2xl">
            <h3 data-i18n="common.confirm_logout" class="text-xl font-bold mb-6">هل أنت متأكد من تسجيل الخروج؟</h3>
            <div class="flex gap-4">
                <button id="confirmYes" data-i18n="common.yes" class="flex-1 bg-black text-white py-3 rounded-2xl font-bold">نعم</button>
                <button id="confirmNo" data-i18n="common.no" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl font-bold">لا</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
