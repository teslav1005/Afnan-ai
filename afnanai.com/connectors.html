<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموصلات - Afnan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: white; }
        .search-input { background-color: #F1F2F4; border-radius: 2rem; }
        .connector-card { background-color: #F8F9FA; border-radius: 1.2rem; }
        .section-title { color: #65676B; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.75rem; margin-top: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='index.html'" class="p-2 hover:bg-gray-100 rounded-full transition-all">

        </p>

        <!-- Search Bar -->
        <div class="relative mb-8">

                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">

                    </div>
                </div>
            </div>
            <div class="connector-card p-4 flex items-center justify-between">
                <div></div>
                <div class="flex items-center gap-3">
                    <span class="font-bold text-gray-800">GitHub</span>
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <i class="fa-brands fa-github text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>

            <div class="connector-card p-4 flex items-center justify-between">

                    <span class="font-bold text-gray-800">Gmail</span>
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">

            </div>

            </div>

                <button class="text-gray-500 font-bold hover:text-gray-800 transition-all">اتصل</button>

                    <span class="font-bold text-gray-800">Box</span>
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">

                    </div>
                </div>
            </div>
        </div>

        <!-- Microsoft 365 Section -->
        <div class="section-title">Microsoft 365</div>
        <div class="connector-card p-4 flex items-center justify-between mb-10">
            <button class="text-gray-500 font-bold hover:text-gray-800 transition-all">اتصل</button>
            <div class="flex items-center gap-3">
                <span class="font-bold text-gray-800">OneDrive</span>
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                    <img src="https://i.postimg.cc/85z1fL5Y/gamma.png" alt="OneDrive" class="w-7 h-7 object-contain">
                </div>
            </div>
        </div>

</html>
