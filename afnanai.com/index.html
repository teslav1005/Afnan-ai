<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Afnan AI - منصة ذكية للدردشة والتواصل مع نماذج AI متقدمة. استمتع بتجربة محادثة سلسة وآمنة مع Afnan Fishe و Afnan Pro و Agent Swarm.">
    <meta name="keywords" content="AI, دردشة ذكية, محادثة, Afnan AI, نموذج لغة, تطبيق ذكي, chatbot">
    <meta name="author" content="Afnan AI">
    <meta property="og:title" content="Afnan AI - منصة الدردشة الذكية">
    <meta property="og:description" content="تحدث مع نماذج AI متقدمة وأنجز مهامك بكفاءة أعلى.">
    <meta property="og:image" content="/logo.jpg">
    <meta name="theme-color" content="#0891b2">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <title>Afnan AI - منصة الدردشة الذكية | محادثة ذكية مع AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app.css">
    <script src="security.js"></script>
    <script src="app.js" defer></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --user-msg-bg: #F4F4F4;
            --bot-msg-bg: #FFFFFF;
        }
        .glass { backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: var(--glass-bg); border: 1px solid var(--glass-border); }
        .sidebar-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Smooth Page Transitions */
        .page-transition { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Hover Effects */
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-2px); }
        
        /* Message Layout */
        .msg-user { align-self: flex-end; margin-left: 20%; }
        .msg-bot { align-self: flex-start; margin-right: 20%; }
        
        /* Custom Scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Long Press Context Menu */
        #contextMenu { position: fixed; z-index: 5000; display: none; min-width: 160px; }
        
        /* Model Selector Top Right */
        #modelSelectorTop { position: absolute; top: 12px; left: 24px; z-index: 1000; }
    </style>
</head>
<body class="antialiased text-gray-900 bg-white page-transition">

    <div id="overlay" class="fixed inset-0 bg-black/10 backdrop-blur-[2px] hidden transition-opacity duration-300 opacity-0" style="z-index: 100;"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-[#fcfcfc] border-r border-gray-100 flex flex-col transform -translate-x-full md:translate-x-0 sidebar-transition h-full shadow-sm md:shadow-none">
        <div class="p-4 flex flex-col gap-4">
            <button id="newChatBtn" class="flex items-center gap-3 w-full bg-white border border-gray-100 p-3.5 rounded-2xl hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" alt="Logo" class="w-5 h-5">
                <span class="font-bold text-gray-700 text-sm">محادثة جديدة</span>
            </button>
            
            <!-- Search in History -->
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                <input type="text" id="historySearch" placeholder="بحث في المحادثات..." class="w-full bg-gray-100 border-none rounded-xl py-2 pr-9 pl-3 text-xs focus:ring-1 focus:ring-gray-200">
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto px-4 space-y-4 hide-scrollbar" id="historyList">
            <!-- Sections: Pinned, Favorites, Recent -->
            <div id="pinnedSection" class="space-y-1 hidden">
                <p class="text-[10px] font-bold text-gray-400 px-2 mb-2">المثبتة</p>
                <div id="pinnedList" class="space-y-1"></div>
            </div>
            <div id="favoritesSection" class="space-y-1 hidden">
                <p class="text-[10px] font-bold text-gray-400 px-2 mb-2">المفضلة</p>
                <div id="favoritesList" class="space-y-1"></div>
            </div>
            <div id="recentSection" class="space-y-1">
                <p class="text-[10px] font-bold text-gray-400 px-2 mb-2">الأخيرة</p>
                <div id="recentList" class="space-y-1"></div>
            </div>
        </div>

        <!-- Credits and System Section -->
        <div class="p-4 border-t border-gray-100 space-y-2 relative" id="creditsSystemSection">
            <!-- Credits Widget (Clickable) - Black & White Style -->
            <div id="creditsWidget" onclick="window.location.href='pricing.html'" class="flex items-center gap-2 bg-white rounded-2xl px-4 py-3 border-2 border-black hidden cursor-pointer hover:bg-black hover:text-white group transition-all duration-300">
                <i class="fa-solid fa-bolt text-black text-sm group-hover:text-white"></i>
                <div class="flex flex-col flex-1">
                    <span id="creditsDisplay" class="text-sm font-black">300</span>
                    <span class="text-[9px] font-bold opacity-60">كريدت شهري</span>
                </div>
                <i class="fa-solid fa-chevron-left text-[10px] opacity-40 group-hover:opacity-100"></i>
            </div>

            <!-- System/Notifications Button -->
            <button id="systemNotificationBtn" onclick="window.location.href='notifications.html'" class="w-full flex items-center gap-3 p-3 rounded-2xl hover:bg-gray-100 transition-all relative hidden">
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid fa-bell text-gray-600 text-sm"></i>
                </div>
                <div class="flex-1 text-right">
                    <p class="text-xs font-bold text-gray-700">النظام</p>
                    <p id="systemNotificationCount" class="text-[10px] text-gray-500">لا توجد إشعارات</p>
                </div>
                <span id="notificationBadge" class="bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden font-bold">0</span>
            </button>
        </div>

        <!-- Profile Section -->
        <div class="p-4 border-t border-gray-100 space-y-1 relative" id="profileSection"></div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 h-full relative">
        <header class="h-[64px] flex items-center justify-between px-6 border-b border-gray-50 bg-white/80 backdrop-blur-md shrink-0 relative">
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="flex flex-col gap-1.5 p-1 md:hidden">
                    <span class="w-6 h-0.5 bg-gray-600 rounded-full"></span>
                    <span class="w-4 h-0.5 bg-gray-600 rounded-full"></span>
                </button>
            </div>

            <!-- Credits and Notifications (Right Side) - REMOVED - Now in Sidebar -->

            <!-- Model Selector (Top Left - Replaces Login Btn) -->
            <div id="modelSelectorTop" class="hidden">
                <button id="currentModelBtn" class="glass px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-white/90 transition-all">
                    <span id="activeModelName">Afnan-Fishe</span>
                    <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
                </button>
                
                <!-- Model Dropdown (Glass) -->
                <div id="modelDropdown" class="glass absolute top-full left-0 mt-2 w-48 rounded-2xl shadow-xl hidden animate-pop overflow-hidden">
                    <div class="p-1.5 space-y-0.5">
                        <div onclick="window.selectModel('Afnan-Fishe', 'Fishe')" class="p-3 hover:bg-white/50 rounded-xl cursor-pointer flex items-center justify-between transition-all">
                            <span class="text-xs font-bold">Afnan-Fishe</span>
                            <i class="fa-solid fa-fish text-blue-500 text-[10px]"></i>
                        </div>
                        <div onclick="window.selectModel('Afnan-Pro', 'Pro')" class="p-3 hover:bg-white/50 rounded-xl cursor-pointer flex items-center justify-between transition-all">
                            <span class="text-xs font-bold">Afnan-Pro</span>
                            <i class="fa-solid fa-star text-purple-500 text-[10px]"></i>
                        </div>
                        <div onclick="window.selectModel('Agent Swarm', 'Swarm')" class="p-3 hover:bg-white/50 rounded-xl cursor-pointer flex items-center justify-between transition-all border-t border-white/20 mt-1 pt-2">
                            <span class="text-xs font-bold">Agent Swarm</span>
                            <i class="fa-solid fa-users-rays text-green-500 text-[10px]"></i>
                        </div>
                        <div onclick="window.selectModel('Agent', 'Agent')" class="p-3 hover:bg-white/50 rounded-xl cursor-pointer flex items-center justify-between transition-all">
                            <span class="text-xs font-bold">Agent</span>
                            <i class="fa-solid fa-user-gear text-gray-500 text-[10px]"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div id="authButtons">
                <button id="loginBtnHeader" onclick="window.navigateToPage('login.html')" class="bg-black text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-gray-800 transition-all">تسجيل الدخول</button>
            </div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto hide-scrollbar scroll-smooth bg-white">
            <div id="emptyView" class="min-h-full flex flex-col items-center justify-center text-center p-12 opacity-30 select-none">
                <img src="https://i.postimg.cc/TYd6FZy0/grok-image-x6em5fj-edit-96291120058942.png" class="w-20 h-20 mb-4 grayscale" alt="Logo">
                <h2 class="text-2xl font-bold">Afnan ai</h2>
            </div>
            <div id="messageBox" class="max-w-4xl mx-auto p-4 md:p-8 flex flex-col gap-8"></div>
        </div>

        <div class="w-full bg-white p-4 md:p-8 pt-5 shrink-0 safe-pb" style="margin-top: 3px;">
            <div class="max-w-3xl mx-auto relative">
                
                <div id="inputContainer" class="chat-input-container bg-white border border-gray-200 rounded-[2.2rem] flex flex-col shadow-lg transition-all relative" style="box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.5);">
                    
                    <!-- Integrated Attachment Preview (Inside Input) -->
                    <div id="attachmentPreview" class="px-4 pt-4 hidden flex-wrap gap-3 pb-3 bg-gradient-to-b from-gray-50/50 to-transparent">
                        <!-- Preview content will be injected here -->
                    </div>

                    <div class="flex items-end gap-1.5 p-2 focus-within:ring-1 focus-within:ring-gray-100 rounded-[2.2rem] relative transition-all duration-300">
                        
                        <div class="relative flex items-center gap-1">
                            <button id="mainAttachBtn" type="button" class="w-11 h-11 flex items-center justify-center rounded-full text-gray-900 bg-white shadow-sm cursor-pointer transition-all active:scale-90 hover:shadow-md" style="z-index: 1100;">
                                <i class="fa-solid fa-plus text-lg pointer-events-none"></i>
                            </button>

                            <!-- Active Mode Icon (No Background, Colored) -->
                            <div id="activeModeIndicator" class="hidden relative group items-center justify-center w-8 h-8 transition-all duration-300">
                                <i id="modeIcon" class="fa-solid fa-brain text-lg"></i>
                                <button id="cancelModeBtn" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full flex items-center justify-center text-[8px] border border-white shadow-sm opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                            
                            <!-- Attachment Menu (Glass) -->
                            <div id="mainAttachMenu" class="glass p-1.5 hidden" style="position: absolute; bottom: 65px; right: 0; width: 220px; z-index: 2000; border-radius: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
                                <div class="space-y-0.5">
                                    <div id="optImage" class="attach-item p-2.5 hover:bg-white/50 rounded-2xl cursor-pointer flex items-center justify-between">
                                        <span class="text-xs font-bold text-gray-700">إرفاق صور</span>
                                        <div class="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-image text-blue-500 text-xs"></i></div>
                                    </div>
                                    <div id="optFile" class="attach-item p-2.5 hover:bg-white/50 rounded-2xl cursor-pointer flex items-center justify-between">
                                        <span class="text-xs font-bold text-gray-700">إرفاق ملفات</span>
                                        <div class="w-8 h-8 bg-purple-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-paperclip text-purple-500 text-xs"></i></div>
                                    </div>
                                    <div id="optWeb" class="attach-item p-2.5 hover:bg-white/50 rounded-2xl cursor-pointer flex items-center justify-between">
                                        <span class="text-xs font-bold text-gray-700">البحث في الويب</span>
                                        <div class="w-8 h-8 bg-green-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-globe text-green-500 text-xs"></i></div>
                                    </div>
                                    <div id="optBrain" class="attach-item p-2.5 hover:bg-white/50 rounded-2xl cursor-pointer flex items-center justify-between">
                                        <span class="text-xs font-bold text-gray-700">التفكير العميق</span>
                                        <div class="w-8 h-8 bg-yellow-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-lightbulb text-yellow-500 text-xs"></i></div>
                                    </div>
                                    <div id="optLinks" class="attach-item p-2.5 hover:bg-white/50 rounded-2xl cursor-pointer flex items-center justify-between border-t border-white/20 mt-1 pt-2" onclick="window.location.href='connectors.html'">
                                        <span class="text-xs font-bold text-gray-700">الروابط</span>
                                        <div class="w-8 h-8 bg-cyan-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-link text-cyan-500 text-xs"></i></div>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <input type="file" id="fileInput" class="hidden">
                        
                        <textarea id="chatInput" rows="1" placeholder="اسأل Afnan ai..." class="flex-1 bg-transparent border-none focus:ring-0 py-4 px-3 text-[16px] resize-none max-h-40 hide-scrollbar" dir="auto"></textarea>
                        
                        <div class="flex items-center gap-2 mb-1 mr-1">
                            <button id="sendBtn" class="w-11 h-11 bg-black text-white rounded-full flex items-center justify-center disabled:opacity-50 transition-all active:scale-90"><i class="fa-solid fa-arrow-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Context Menu (Glass) -->
    <div id="contextMenu" class="glass rounded-2xl shadow-2xl overflow-hidden animate-pop">
        <div class="p-1.5 space-y-0.5">
            <div id="ctxPin" class="p-3 hover:bg-white/50 rounded-xl cursor-pointer flex items-center gap-3 transition-all">
                <i class="fa-solid fa-thumbtack text-blue-500 text-xs"></i>
                <span class="text-xs font-bold">تثبيت المحادثة</span>
            </div>
            <div id="ctxFav" class="p-3 hover:bg-white/50 rounded-xl cursor-pointer flex items-center gap-3 transition-all">
                <i class="fa-solid fa-star text-yellow-500 text-xs"></i>
                <span class="text-xs font-bold">إضافة للمفضلة</span>
            </div>
            <div id="ctxDel" class="p-3 hover:bg-red-50 rounded-xl cursor-pointer flex items-center gap-3 transition-all text-red-500">
                <i class="fa-solid fa-trash-can text-xs"></i>
                <span class="text-xs font-bold">حذف المحادثة</span>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="imageViewer" class="fixed inset-0 bg-black/95 z-[4000] hidden flex-col" onclick="if(event.target === this) window.closeImageViewer()" style="animation: fadeIn 0.3s ease-out;">
        <div class="flex justify-between items-center p-6 text-white">
            <button onclick="window.closeImageViewer()" class="text-2xl hover:bg-white/10 p-2 rounded-lg transition-all"><i class="fa-solid fa-xmark"></i></button>
            <button id="deleteImageBtn" class="text-xl text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition-all"><i class="fa-solid fa-trash-can"></i></button>
        </div>
        <div class="flex-1 flex items-center justify-center p-4">
            <img id="viewerImg" src="index.html" class="max-w-full max-h-full object-contain rounded-2xl" style="box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 255, 255, 0.1); animation: slideInScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);">
        </div>
    </div>

    <div id="logoutConfirm" class="hidden fixed inset-0 bg-black/40 z-[9999] items-center justify-center">
        <div class="glass p-8 rounded-3xl text-center max-w-xs w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">هل أنت متأكد من تسجيل الخروج؟</h3>
            <div class="flex gap-4">
                <button id="confirmYes" class="flex-1 bg-black text-white py-3 rounded-2xl font-bold">نعم</button>
                <button id="confirmNo" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl font-bold">لا</button>
            </div>
        </div>
    </div>

    <!-- Links Bottom Sheet Modal -->
    <div id="linksBottomSheet" class="fixed inset-0 hidden z-[3500]" onclick="if(event.target === this) window.closeLinksSheet()" style="background: rgba(0, 0, 0, 0.3);">
        <div class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] shadow-2xl max-h-[60vh] overflow-hidden flex flex-col">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mt-4 mb-2"></div>
            <div class="p-4 text-center">
                <h2 class="text-xl font-bold text-gray-900">الروابط</h2>
            </div>
            <div id="linksGrid" class="flex-1 overflow-y-auto p-4 space-y-2">
                <!-- Links will be injected here -->
            </div>
            <div class="p-6 bg-white">
                <button onclick="window.openConnectionsPage()" class="w-full bg-black text-white py-4 rounded-full text-lg font-bold hover:bg-gray-900 transition-all active:scale-[0.98]">إدارة</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script type="module" src="script.js"></script>
    <script>
        // تحديث عرض الكريدت والإشعارات في الشريط الجانبي
        function updateUIData() {
            const user = AccountSystem.getCurrentUser();
            const creditsWidget = document.getElementById('creditsWidget');
            const systemBtn = document.getElementById('systemNotificationBtn');
            const creditsDisplay = document.getElementById('creditsDisplay');
            const creditsLabel = creditsDisplay.nextElementSibling;
            const badge = document.getElementById('notificationBadge');
            const systemNotificationCount = document.getElementById('systemNotificationCount');
            
            if (user) {
                creditsWidget.classList.remove('hidden');
                systemBtn.classList.remove('hidden');
                
                // تحديث عرض الكريدت أو الاستخدام المفتوح
                if (user.plan === 'pro' || user.plan === 'ultra') {
                    creditsDisplay.textContent = 'مفتوح';
                    creditsLabel.textContent = user.plan === 'pro' ? 'استخدام محدود' : 'أعلى سقف';
                } else {
                    creditsDisplay.textContent = user.credits;
                    creditsLabel.textContent = 'كريدت شهري';
                }
                
                const notifications = AccountSystem.getNotifications();
                const unreadCount = notifications.filter(n => !n.read).length;
                
                if (unreadCount > 0) {
                    badge.textContent = unreadCount;
                    badge.classList.remove('hidden');
                    systemNotificationCount.textContent = unreadCount + ' إشعار جديد';
                } else {
                    badge.classList.add('hidden');
                    systemNotificationCount.textContent = 'لا توجد إشعارات';
                }
            } else {
                creditsWidget.classList.add('hidden');
                systemBtn.classList.add('hidden');
            }
        }
        
        // تحديث العرض عند تحميل الصفحة
        window.addEventListener('load', updateUIData);
        
        // تحديث العرض كل 5 ثوان
        setInterval(updateUIData, 5000);
    </script>
</body>
</html>
