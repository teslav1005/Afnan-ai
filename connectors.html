<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموصلات - Afnan AI</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: white; overflow-x: hidden; }
        .search-input { background-color: #F1F2F4; border-radius: 2rem; }
        .connector-card { background-color: #F8F9FA; border-radius: 1.2rem; transition: all 0.2s ease; }
        .connector-card:active { transform: scale(0.98); background-color: #F1F2F4; }
        .section-title { color: #65676B; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.75rem; margin-top: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='index.html'" class="p-2 hover:bg-gray-100 rounded-full transition-all">
                <i class="fa-solid fa-arrow-right text-xl"></i>
            </button>
            <h1 class="text-2xl font-bold text-gray-900">الموصلات</h1>
            <div class="w-10"></div>
        </div>

        <!-- Description -->
        <p class="text-gray-500 text-sm mb-6 leading-relaxed">
            الموصلات تسمح لـ Afnan AI إنه يستخدم أدوات ومصادر بيانات خارجية.
        </p>

        <!-- Search Bar -->
        <div class="relative mb-8">
            <i class="fa-solid fa-magnifying-glass absolute right-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" placeholder="البحث في الموصلات..." class="w-full py-4 pr-12 pl-5 search-input border-none focus:ring-0 text-gray-700">
        </div>

        <!-- Connected Section -->
        <div class="section-title">متصل</div>
        <div class="space-y-2">
            <a href="connector-detail.html?id=gdrive" class="connector-card p-4 flex items-center justify-between hover:bg-gray-100 transition-all">
                <div></div>
                <div class="flex items-center gap-3">
                    <span class="font-bold text-gray-800">Google Drive</span>
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <img src="https://i.postimg.cc/yDKc929g/Drive.png" alt="Google Drive" class="w-7 h-7 object-contain">
                    </div>
                </div>
            </a>
            <a href="connector-detail.html?id=vercel" class="connector-card p-4 flex items-center justify-between hover:bg-gray-100 transition-all">
                <div></div>
                <div class="flex items-center gap-3">
                    <span class="font-bold text-gray-800">Vercel</span>
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <img src="https://i.postimg.cc/LJSLfGfZ/vercl.png" alt="Vercel" class="w-7 h-7 object-contain">
                    </div>
                </div>
            </a>
        </div>

        <!-- Featured Section -->
        <div class="section-title">المميز</div>
        <div class="space-y-1">
            <a href="connector-detail.html?id=gmail" class="connector-card p-4 flex items-center justify-between hover:bg-gray-100 transition-all">
                <div class="text-gray-500 font-bold">اتصل</div>
                <div class="flex items-center gap-3">
                    <span class="font-bold text-gray-800">Gemail</span>
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <img src="https://i.postimg.cc/hXnTxNxx/Email.png" alt="Gemail" class="w-7 h-7 object-contain">
                    </div>
                </div>
            </a>
            <a href="connector-detail.html?id=gethelp" class="connector-card p-4 flex items-center justify-between hover:bg-gray-100 transition-all">
                <div class="text-gray-500 font-bold">اتصل</div>
                <div class="flex items-center gap-3">
                    <span class="font-bold text-gray-800">Gethelp</span>
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <img src="https://i.postimg.cc/tsbWP8P7/Getep.png" alt="Gethelp" class="w-7 h-7 object-contain">
                    </div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
