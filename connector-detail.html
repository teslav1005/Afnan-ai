<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ربط الموصلات مع Afnan AI">
    <title id="pageTitle">الموصل - Afnan AI</title>
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .glass-modal { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.95); }
        .connector-icon { width: 120px; height: 120px; }
        .pulse-animation { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <button onclick="window.location.href='connectors.html'" class="p-2 hover:bg-white rounded-full transition-all shadow-sm">
                <i class="fa-solid fa-arrow-right text-xl text-gray-700"></i>
            </button>
            <h1 id="connectorName" class="text-2xl font-bold text-gray-900">الموصل</h1>
            <div class="w-10"></div>
        </div>

        <!-- Connector Card -->
        <div class="bg-white rounded-3xl shadow-xl p-8 text-center mb-8">
            <div class="flex justify-center mb-6">
                <img id="connectorImg" src="" alt="Connector" class="connector-icon object-contain">
            </div>
            <h2 id="connectorTitle" class="text-3xl font-bold text-gray-900 mb-2">الموصل</h2>
            <p class="text-gray-600 text-sm mb-8 leading-relaxed">
                اتصل بهذا الموصل لتفعيل الميزات المتقدمة والحصول على إمكانيات إضافية.
            </p>

            <!-- Connect Button -->
            <button onclick="window.openConnectModal()" class="w-full bg-black text-white py-4 rounded-full text-lg font-bold hover:bg-gray-900 transition-all active:scale-[0.98] shadow-lg">
                اتصل الآن
            </button>
        </div>

        <!-- Info Section -->
        <div class="bg-white rounded-2xl shadow-md p-6 mb-8">
            <h3 class="text-lg font-bold text-gray-900 mb-4">معلومات الموصل</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-gray-600">الحالة:</span>
                    <span id="connectorStatus" class="text-sm font-bold text-red-500">مفصول</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-gray-600">النوع:</span>
                    <span id="connectorType" class="text-sm font-bold text-gray-800">خدمة خارجية</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Connect Modal (Glass Effect) -->
    <div id="connectModal" class="fixed inset-0 hidden z-[4000] flex items-center justify-center p-4" style="background: rgba(0, 0, 0, 0.4);" onclick="if(event.target === this) window.closeConnectModal()">
        <div class="glass-modal rounded-3xl shadow-2xl max-w-md w-full p-8 animate-in fade-in zoom-in duration-300">
            <div class="text-center mb-6">
                <i class="fa-solid fa-hourglass-end text-4xl text-blue-500 pulse-animation mb-4 inline-block"></i>
                <h3 class="text-2xl font-bold text-gray-900 mb-2">قريباً</h3>
                <p class="text-gray-600 text-sm leading-relaxed">
                    سيتم إضافة هذا الموصل قريباً جداً. يرجي التحلي بالصبر والانتظار لتفعيل هذه الميزة المتقدمة.
                </p>
            </div>
            <button onclick="window.closeConnectModal()" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-3 rounded-full font-bold hover:shadow-lg transition-all">
                حسناً
            </button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // الحصول على معرف الموصل من URL
        const urlParams = new URLSearchParams(window.location.search);
        const connectorId = urlParams.get('id');

        // تحميل بيانات الموصل
        function loadConnector() {
            const user = AccountSystem.getCurrentUser();
            if (!user || !connectorId) {
                window.location.href = 'connectors.html';
                return;
            }

            const connector = user.connectors.find(c => c.id === connectorId);
            if (!connector) {
                window.location.href = 'connectors.html';
                return;
            }

            // تحديث الصفحة
            document.getElementById('pageTitle').textContent = `${connector.name} - Afnan AI`;
            document.getElementById('connectorName').textContent = connector.name;
            document.getElementById('connectorTitle').textContent = connector.name;
            document.getElementById('connectorImg').src = connector.img;
            document.getElementById('connectorStatus').textContent = connector.enabled ? 'متصل' : 'مفصول';
            document.getElementById('connectorStatus').className = connector.enabled ? 'text-sm font-bold text-green-500' : 'text-sm font-bold text-red-500';
        }

        // فتح نافذة الاتصال
        window.openConnectModal = () => {
            document.getElementById('connectModal').classList.remove('hidden');
        };

        // إغلاق نافذة الاتصال
        window.closeConnectModal = () => {
            document.getElementById('connectModal').classList.add('hidden');
        };

        // تحميل البيانات عند فتح الصفحة
        loadConnector();
    </script>
</body>
</html>
